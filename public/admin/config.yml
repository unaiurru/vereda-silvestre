# =============================================================
# Decap CMS — configuración del panel de administración (/admin)
# =============================================================
# Cada `collection` es un grupo editable. Las rutas `file:` deben
# coincidir con los archivos JSON reales del proyecto.
# Documentación: https://decapcms.org/docs/

# -------------------------------------------------------------
# BACKEND — conexión con GitHub para guardar los cambios.
# Usa GitHub directo + el proxy OAuth alojado en /api/auth
# (ver api/auth.js y api/callback.js).
#
# ⚠️  base_url DEBE ser la dirección pública real de la web.
#     Ahora apunta al dominio de Vercel. CUANDO MIGRES A TU
#     DOMINIO PROPIO, cambia esta línea por https://tudominio.com
#     y actualiza también la "Authorization callback URL" de la
#     GitHub OAuth App (ver ADMIN-SETUP.md).
# -------------------------------------------------------------
backend:
  name: github
  repo: unaiurru/vereda-silvestre
  branch: main
  base_url: https://vereda-silvestre.vercel.app
  auth_endpoint: api/auth

# Un cambio = un commit (sin flujo de revisión). Más simple para el cliente.
publish_mode: simple

# Carpeta donde Decap sube las imágenes que arrastres al panel.
# Van a /public (raíz) y se referencian como "/archivo.jpg",
# igual que el resto de imágenes del sitio.
media_folder: "public"
public_folder: "/"

# Idioma del panel
locale: 'es'

# -------------------------------------------------------------
# COLECCIONES — los formularios editables
# -------------------------------------------------------------
collections:

  # ===========================================================
  # DATOS DEL NEGOCIO — contacto, redes, ubicación.
  # ===========================================================
  - name: "negocio"
    label: "🏪 Datos del negocio"
    description: "Contacto, WhatsApp, email, redes sociales, ubicación y horario."
    files:
      - name: "info"
        label: "Información de contacto y marca"
        file: "src/data/negocio.json"
        fields:
          - { label: "Nombre", name: "nombre", widget: "string" }
          - { label: "Nombre legal (pie de página)", name: "nombreLegal", widget: "string" }
          - { label: "WhatsApp (solo dígitos)", name: "whatsapp", widget: "string", hint: "Formato internacional sin + ni espacios. Ejemplo: 5215562058871" }
          - { label: "Teléfono visible", name: "telefonoVisible", widget: "string", hint: "Cómo se muestra al usuario. Ejemplo: +52 1 55 6205 8871" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Ciudad (versión corta)", name: "ciudad", widget: "string", hint: "Ejemplo: Jilotepec, Estado de México" }
          - { label: "Ciudad (versión completa)", name: "ciudadCompleta", widget: "string" }
          - { label: "Horario", name: "horario", widget: "string", hint: "Ejemplo: Lun–Sáb · 9:00 – 19:00" }
          - { label: "Instagram (URL completa)", name: "instagram", widget: "string", required: false }
          - { label: "Facebook (URL completa)", name: "facebook", widget: "string", required: false }
          - { label: "Mapa de Google (URL del embed)", name: "mapaEmbed", widget: "text", required: false, hint: "La URL que aparece en el iframe del mapa de Google Maps." }

  # ===========================================================
  # SERVICIOS — añadir, quitar y editar servicios y precios.
  # ===========================================================
  - name: "servicios"
    label: "🐕 Servicios"
    description: "Pensión, adiestramiento, paseos, excursiones, programas, sesiones y formación."
    files:
      - name: "lista"
        label: "Lista de servicios"
        file: "src/data/servicios.json"
        fields:
          - label: "Servicios"
            name: "items"
            label_singular: "Servicio"
            widget: "list"
            summary: "{{fields.titulo}} — {{fields.precio}}"
            fields:
              - { label: "ID / URL (sin acentos ni espacios)", name: "slug", widget: "string", hint: "Se usa en la dirección web. No cambiarlo una vez creado." }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Categoría", name: "categoria", widget: "string", hint: "Ej: Pensión, Adiestramiento, Paseo, Excursión, Programa, Sesión, Formación." }
              - { label: "Precio", name: "precio", widget: "string", hint: "Ej: 500 MXN / día" }
              - label: "Estado"
                name: "estado"
                widget: "select"
                default: "activo"
                options:
                  - { label: "Activo (se puede reservar)", value: "activo" }
                  - { label: "Finalizado", value: "finalizado" }
              - { label: "Resumen (texto de la tarjeta)", name: "resumen", widget: "text" }
              - { label: "Descripción (un párrafo por línea)", name: "descripcion", widget: "list", field: { label: "Párrafo", name: "parrafo", widget: "text" } }
              - { label: "Qué incluye", name: "incluye", widget: "list", field: { label: "Punto", name: "punto", widget: "string" } }
              - { label: "Foto de portada", name: "portada", widget: "image", required: false, hint: "Foto que aparece en la tarjeta del listado." }
              - label: "Galería (fotos/vídeos)"
                name: "media"
                widget: "list"
                required: false
                label_singular: "Elemento"
                summary: "{{fields.tipo}}"
                fields:
                  - label: "Tipo"
                    name: "tipo"
                    widget: "select"
                    default: "imagen"
                    options:
                      - { label: "Imagen", value: "imagen" }
                      - { label: "Vídeo", value: "video" }
                      - { label: "Pendiente (texto)", value: "pendiente" }
                  - { label: "Archivo (imagen o vídeo)", name: "src", widget: "image", required: false }
                  - { label: "Texto (solo si es 'Pendiente')", name: "label", widget: "string", required: false }

  # ===========================================================
  # TIENDA — productos, precios y stock.
  # ===========================================================
  - name: "tienda"
    label: "🛒 Tienda"
    description: "Productos de la tienda: añadir, quitar, cambiar precio o marcar agotado."
    files:
      - name: "lista"
        label: "Lista de productos"
        file: "src/data/productos.json"
        fields:
          - label: "Productos"
            name: "items"
            label_singular: "Producto"
            widget: "list"
            summary: "{{fields.nombre}} — {{fields.precio}} MXN"
            fields:
              - { label: "ID / URL (sin acentos ni espacios)", name: "id", widget: "string", hint: "Se usa en la dirección web. No cambiarlo una vez creado." }
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Precio (solo número, en MXN)", name: "precio", widget: "number", value_type: "int", min: 0 }
              - { label: "Foto", name: "imagen", widget: "image" }
              - { label: "Categoría", name: "categoria", widget: "string", hint: "Ej: Correas, Collares, Transporte, Adiestramiento." }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - label: "Etiqueta"
                name: "etiqueta"
                widget: "select"
                required: false
                default: ""
                options:
                  - { label: "Sin etiqueta", value: "" }
                  - { label: "Más vendido", value: "mas-vendido" }
                  - { label: "Nuevo", value: "nuevo" }
              - { label: "En stock (disponible)", name: "stock", widget: "boolean", default: true }

  # ===========================================================
  # INICIO — textos e imágenes de la página de inicio.
  # ===========================================================
  - name: "inicio"
    label: "🏠 Inicio (textos)"
    description: "Hero, beneficios, programas destacados, intro y llamadas a la acción de la portada."
    files:
      - name: "contenido"
        label: "Contenido de la home"
        file: "src/data/inicio.json"
        fields:
          - label: "Cabecera (hero)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Texto pequeño superior", name: "ubicacion", widget: "string" }
              - { label: "Título grande", name: "titulo", widget: "text" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - { label: "Botón WhatsApp", name: "ctaWhatsapp", widget: "string" }
              - { label: "Botón servicios", name: "ctaServicios", widget: "string" }
          - label: "Beneficios (4 bloques)"
            name: "beneficios"
            widget: "list"
            fields:
              - label: "Icono"
                name: "icono"
                widget: "select"
                options: ["Heart", "Mountain", "PawPrint", "Sparkles"]
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto", name: "texto", widget: "text" }
          - label: "Programas destacados"
            name: "programas"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - { label: "Texto del enlace inferior", name: "verTodos", widget: "string" }
              - label: "Tarjetas"
                name: "items"
                widget: "list"
                summary: "{{fields.titulo}}"
                fields:
                  - { label: "Título", name: "titulo", widget: "string" }
                  - { label: "Descripción", name: "desc", widget: "text" }
                  - { label: "Fotos (carrusel)", name: "imgs", widget: "list", field: { label: "Foto", name: "foto", widget: "image" } }
          - label: "Intro 'Quiénes somos'"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Título", name: "titulo", widget: "text" }
              - { label: "Imagen", name: "imagen", widget: "image" }
              - { label: "Párrafos", name: "parrafos", widget: "list", field: { label: "Párrafo", name: "parrafo", widget: "text" } }
              - { label: "Texto del enlace", name: "enlace", widget: "string" }
          - label: "Únete al equipo"
            name: "unete"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto", name: "texto", widget: "text" }
              - { label: "Botón", name: "cta", widget: "string" }
              - { label: "Imagen", name: "imagen", widget: "image" }
          - label: "Llamada final"
            name: "ctaFinal"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto", name: "texto", widget: "text" }
              - { label: "Botón", name: "cta", widget: "string" }

  # ===========================================================
  # NOSOTROS — textos e imágenes de la página "Nosotros".
  # ===========================================================
  - name: "nosotros"
    label: "👩 Nosotros (textos)"
    description: "Historia, frase, formación, pilares, el lugar, galería y cierre."
    files:
      - name: "contenido"
        label: "Contenido de Nosotros"
        file: "src/data/nosotros.json"
        fields:
          - { label: "Nombre de la dueña", name: "nombreDuenia", widget: "string" }
          - label: "Cabecera"
            name: "cabecera"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Título", name: "titulo", widget: "text" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
          - label: "Presentación"
            name: "presentacion"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Foto", name: "imagen", widget: "image" }
              - { label: "Historia (párrafos)", name: "historia", widget: "list", field: { label: "Párrafo", name: "parrafo", widget: "text" } }
          - { label: "Frase destacada", name: "frase", widget: "text" }
          - label: "Formación"
            name: "formacion"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto", name: "texto", widget: "text" }
              - { label: "Puntos", name: "items", widget: "list", field: { label: "Punto", name: "punto", widget: "string" } }
          - label: "Enfoque (pilares)"
            name: "enfoque"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - label: "Pilares"
                name: "pilares"
                widget: "list"
                summary: "{{fields.titulo}}"
                fields:
                  - label: "Icono"
                    name: "icono"
                    widget: "select"
                    options: ["Eye", "Heart", "Users"]
                  - { label: "Título", name: "titulo", widget: "string" }
                  - { label: "Texto", name: "texto", widget: "text" }
          - label: "El lugar (rancho)"
            name: "rancho"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Título", name: "titulo", widget: "text" }
              - { label: "Foto", name: "imagen", widget: "image" }
              - { label: "Párrafos", name: "parrafos", widget: "list", field: { label: "Párrafo", name: "parrafo", widget: "text" } }
              - label: "Cifras"
                name: "cifras"
                widget: "list"
                summary: "{{fields.numero}} {{fields.etiqueta}}"
                fields:
                  - { label: "Número", name: "numero", widget: "string" }
                  - { label: "Etiqueta", name: "etiqueta", widget: "string" }
          - label: "Galería (mosaico)"
            name: "galeria"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - label: "Fotos"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "ID (número único)", name: "id", widget: "number", value_type: "int" }
                  - { label: "Tipo", name: "type", widget: "hidden", default: "image" }
                  - { label: "Título", name: "title", widget: "string" }
                  - { label: "Descripción", name: "desc", widget: "text" }
                  - { label: "Foto", name: "url", widget: "image" }
                  - { label: "Tamaño en el mosaico (avanzado)", name: "span", widget: "string", hint: "Clases de CSS grid. No tocar salvo que sepas lo que haces." }
          - label: "Cierre (CTA)"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto", name: "texto", widget: "text" }
              - { label: "Botón WhatsApp", name: "ctaWhatsapp", widget: "string" }
              - { label: "Botón servicios", name: "ctaServicios", widget: "string" }

  # ===========================================================
  # CONTACTO — textos de la página (los datos van en "Datos del negocio").
  # ===========================================================
  - name: "contacto"
    label: "✉️ Contacto (textos)"
    description: "Textos de la página de contacto. Teléfono, email, mapa y horario se editan en 'Datos del negocio'."
    files:
      - name: "contenido"
        label: "Textos de Contacto"
        file: "src/data/contacto.json"
        fields:
          - label: "Cabecera"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
          - label: "Tarjetas de contacto"
            name: "tarjetas"
            widget: "object"
            fields:
              - { label: "Texto tarjeta WhatsApp", name: "whatsappDesc", widget: "text" }
              - { label: "Texto tarjeta Email", name: "emailDesc", widget: "text" }
              - { label: "Texto tarjeta Ubicación", name: "ubicacionDesc", widget: "text" }
          - label: "Formulario"
            name: "formulario"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto introductorio", name: "intro", widget: "text" }

  # ===========================================================
  # ÚNETE — textos de la página de empleo / candidaturas.
  # ===========================================================
  - name: "unete"
    label: "🤝 Únete (textos)"
    description: "Textos de la página 'Únete a nuestro equipo'."
    files:
      - name: "contenido"
        label: "Textos de Únete"
        file: "src/data/unete.json"
        fields:
          - label: "Cabecera"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
          - { label: "Sobre el trabajo (párrafos)", name: "sobreTrabajo", widget: "list", field: { label: "Párrafo", name: "parrafo", widget: "text" } }
          - label: "Perfiles"
            name: "perfiles"
            widget: "list"
            summary: "{{fields.titulo}}"
            fields:
              - label: "Icono"
                name: "icono"
                widget: "select"
                options: ["Compass", "Sprout", "Users"]
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto", name: "texto", widget: "text" }
          - label: "Cómo aplicar"
            name: "aplicar"
            widget: "object"
            fields:
              - { label: "Epígrafe", name: "epigrafe", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto", name: "intro", widget: "text" }

  # ===========================================================
  # AVISO DE PRIVACIDAD (texto legal).
  # En los textos: **negrita** = negrita; {email} = correo del negocio.
  # ===========================================================
  - name: "aviso-privacidad"
    label: "📄 Aviso de privacidad"
    description: "Texto legal del aviso de privacidad. Usa **negrita** y {email} dentro del texto."
    files:
      - name: "contenido"
        label: "Aviso de privacidad"
        file: "src/data/aviso-privacidad.json"
        fields:
          - { label: "Epígrafe", name: "epigrafe", widget: "string" }
          - { label: "Título", name: "titulo", widget: "string" }
          - { label: "Fecha de actualización", name: "actualizacion", widget: "string" }
          - { label: "Introducción", name: "intro", widget: "text", hint: "Usa **negrita** y {email} (se convierte en el correo del negocio)." }
          - label: "Secciones"
            name: "secciones"
            widget: "list"
            summary: "{{fields.titulo}}"
            fields:
              - { label: "Título de la sección", name: "titulo", widget: "string" }
              - { label: "Párrafos", name: "parrafos", widget: "list", required: false, field: { label: "Párrafo", name: "p", widget: "text" } }
              - { label: "Lista (viñetas)", name: "lista", widget: "list", required: false, field: { label: "Punto", name: "p", widget: "text" } }
              - { label: "Párrafos tras la lista", name: "parrafosFinal", widget: "list", required: false, field: { label: "Párrafo", name: "p", widget: "text" } }
          - { label: "Recuadro final", name: "cierre", widget: "text", required: false }

  # ===========================================================
  # POLÍTICA DE COOKIES (texto legal).
  # ===========================================================
  - name: "cookies"
    label: "🍪 Política de cookies"
    description: "Texto legal de la política de cookies."
    files:
      - name: "contenido"
        label: "Política de cookies"
        file: "src/data/cookies.json"
        fields:
          - { label: "Epígrafe", name: "epigrafe", widget: "string" }
          - { label: "Título", name: "titulo", widget: "string" }
          - { label: "Fecha de actualización", name: "actualizacion", widget: "string" }
          - { label: "Introducción", name: "intro", widget: "text" }
          - label: "Secciones"
            name: "secciones"
            widget: "list"
            summary: "{{fields.titulo}}"
            fields:
              - { label: "Título de la sección", name: "titulo", widget: "string" }
              - { label: "Párrafos", name: "parrafos", widget: "list", required: false, field: { label: "Párrafo", name: "p", widget: "text" } }
              - label: "Tabla de cookies"
                name: "tablaCookies"
                widget: "list"
                required: false
                summary: "{{fields.nombre}}"
                fields:
                  - { label: "Nombre de la cookie", name: "nombre", widget: "string" }
                  - { label: "Finalidad", name: "finalidad", widget: "text" }
                  - { label: "Duración", name: "duracion", widget: "string" }
          - { label: "Recuadro final", name: "cierre", widget: "text", required: false }
